name: GlyphCrafter CI/CD

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

env:
  DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
  PROJECT_NAME: GlyphCrafter
  SCHEME: GlyphCrafter
  DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=latest'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Static Analysis
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Analyze
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Swift Version
        run: swift --version

      - name: SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --strict --reporter github-actions-logging
          else
            echo "SwiftLint not installed, installing via Homebrew..."
            brew install swiftlint
            swiftlint lint --strict --reporter github-actions-logging
          fi
        continue-on-error: true

      - name: Verify project structure
        run: |
          echo "Checking required files..."
          test -f GlyphCrafter.xcodeproj/project.pbxproj || (echo "Missing project file" && exit 1)
          test -f GlyphCrafter/Info.plist || (echo "Missing Info.plist" && exit 1)
          test -f GlyphCrafter/App/GlyphCrafterApp.swift || (echo "Missing app entry" && exit 1)
          test -f GlyphCrafterKeyboard/Info.plist || (echo "Missing keyboard Info.plist" && exit 1)
          echo "All required files present."

  # ─────────────────────────────────────────────
  # Job 2: Build (Debug & Release)
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: macos-15
    needs: lint
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('GlyphCrafter.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Build Main App
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration ${{ matrix.configuration }} \
            -destination "$DESTINATION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color || true

      - name: Build Keyboard Extension
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -target "GlyphCrafterKeyboard" \
            -configuration ${{ matrix.configuration }} \
            -destination "$DESTINATION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color || true

  # ─────────────────────────────────────────────
  # Job 3: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('GlyphCrafter.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color --report junit || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 4: Generate App Icon
  # ─────────────────────────────────────────────
  generate-icon:
    name: Generate App Icon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate icon
        run: python3 Scripts/generate_app_icon.py --output appicon_1024.png

      - name: Upload icon artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-icon
          path: appicon_1024.png
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 5: Archive (Release only, on tags)
  # ─────────────────────────────────────────────
  archive:
    name: Archive for Distribution
    runs-on: macos-15
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/$PROJECT_NAME.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive
          path: build/${{ env.PROJECT_NAME }}.xcarchive
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 6: Create GitHub Release (on tags)
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: archive
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Archive
        uses: actions/download-artifact@v4
        with:
          name: xcarchive
          path: ./archive

      - name: Download Icon
        uses: actions/download-artifact@v4
        with:
          name: app-icon
          path: ./icon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./archive/**
            ./icon/appicon_1024.png
