name: GlyphCrafter CI/CD

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

env:
  DEVELOPER_DIR: /Applications/Xcode_16.0.app/Contents/Developer
  PROJECT_NAME: GlyphCrafter
  SCHEME: GlyphCrafter
  DESTINATION_SIM: 'platform=iOS Simulator,name=iPhone 16,OS=latest'
  DESTINATION_DEVICE: 'generic/platform=iOS'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Static Analysis
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Analyze
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Swift Version
        run: swift --version

      - name: SwiftLint
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --strict --reporter github-actions-logging
          else
            brew install swiftlint
            swiftlint lint --strict --reporter github-actions-logging
          fi
        continue-on-error: true

      - name: Verify project structure
        run: |
          echo "Checking required files..."
          for f in \
            GlyphCrafter.xcodeproj/project.pbxproj \
            GlyphCrafter/Info.plist \
            GlyphCrafter/App/GlyphCrafterApp.swift \
            GlyphCrafter/Services/AI/LocalLLMService.swift \
            GlyphCrafter/Services/AI/SVGToPathConverter.swift \
            GlyphCrafterKeyboard/Info.plist \
            GlyphCrafterKeyboard/KeyboardViewController.swift \
            ExportOptions.plist \
            Makefile; do
            test -f "$f" || (echo "MISSING: $f" && exit 1)
          done
          echo "All required files present."

  # ─────────────────────────────────────────────
  # Job 2: Resolve SPM Dependencies
  # ─────────────────────────────────────────────
  resolve-deps:
    name: Resolve Dependencies
    runs-on: macos-15
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: build/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('GlyphCrafter/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath build/SourcePackages

  # ─────────────────────────────────────────────
  # Job 3: Build (Debug & Release)
  # ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.configuration }})
    runs-on: macos-15
    needs: resolve-deps
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ matrix.configuration }}-${{ hashFiles('GlyphCrafter.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ matrix.configuration }}-

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: build/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('GlyphCrafter/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build App + Keyboard Extension
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration ${{ matrix.configuration }} \
            -destination "$DESTINATION_SIM" \
            -clonedSourcePackagesDirPath build/SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | xcpretty --color || true

  # ─────────────────────────────────────────────
  # Job 4: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: macos-15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            build/SourcePackages
          key: ${{ runner.os }}-test-${{ hashFiles('GlyphCrafter.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION_SIM" \
            -clonedSourcePackagesDirPath build/SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --color --report junit || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 5: Generate App Icon
  # ─────────────────────────────────────────────
  generate-icon:
    name: Generate App Icon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate icon
        run: python3 Scripts/generate_app_icon.py --output appicon_1024.png

      - name: Upload icon artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-icon
          path: appicon_1024.png
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 6: Build Unsigned IPA
  # ─────────────────────────────────────────────
  ipa:
    name: Build IPA
    runs-on: macos-15
    needs: [build, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: build/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('GlyphCrafter/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Release .app
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "$DESTINATION_SIM" \
            -derivedDataPath build/DerivedData \
            -clonedSourcePackagesDirPath build/SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | xcpretty --color

      - name: Package into IPA
        run: |
          echo "Searching for .app bundles in DerivedData..."
          find build/DerivedData -name "*.app" -type d 2>/dev/null || true
          mkdir -p build/ipa/Payload
          # Look for the app in standard build products paths first
          APP_PATH=""
          for search_dir in \
            "build/DerivedData/Build/Products/Release-iphonesimulator" \
            "build/DerivedData/Build/Products/Release-iphoneos" \
            "build/DerivedData"; do
            FOUND=$(find "$search_dir" -maxdepth 3 -name "$SCHEME.app" -type d 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              APP_PATH="$FOUND"
              break
            fi
          done
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: $SCHEME.app not found in DerivedData"
            echo "DerivedData contents:"
            find build/DerivedData -type d -maxdepth 4 2>/dev/null || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../$SCHEME.ipa Payload/
          echo "IPA created:"
          ls -lh ../GlyphCrafter.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GlyphCrafter-ipa
          path: build/${{ env.PROJECT_NAME }}.ipa
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 7: Archive + Signed IPA (on tags)
  # ─────────────────────────────────────────────
  archive:
    name: Archive & Export Signed IPA
    runs-on: macos-15
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: build/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('GlyphCrafter/Package.swift') }}

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "$DESTINATION_DEVICE" \
            -archivePath build/$PROJECT_NAME.xcarchive \
            -clonedSourcePackagesDirPath build/SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Export IPA from Archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/$PROJECT_NAME.xcarchive \
            -exportPath build/ipa-signed \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            || echo "Signed export requires provisioning profile (expected in CI without certs)"

      - name: Fallback - Package Unsigned IPA from Archive
        run: |
          if [ ! -f build/ipa-signed/$SCHEME.ipa ]; then
            echo "Signed export unavailable, packaging unsigned IPA from archive..."
            mkdir -p build/ipa-signed/Payload
            cp -R "build/$SCHEME.xcarchive/Products/Applications/$SCHEME.app" build/ipa-signed/Payload/ 2>/dev/null || true
            cd build/ipa-signed && zip -r ../$SCHEME-release.ipa Payload/ 2>/dev/null || true
          fi

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive
          path: build/${{ env.PROJECT_NAME }}.xcarchive
          retention-days: 30

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GlyphCrafter-release-ipa
          path: build/*.ipa
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 8: Create GitHub Release (on tags)
  # ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [archive, generate-icon, ipa]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: GlyphCrafter-release-ipa
          path: ./dist

      - name: Download unsigned IPA
        uses: actions/download-artifact@v4
        with:
          name: GlyphCrafter-ipa
          path: ./dist
        continue-on-error: true

      - name: Download Icon
        uses: actions/download-artifact@v4
        with:
          name: app-icon
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./dist/*.ipa
            ./dist/appicon_1024.png
